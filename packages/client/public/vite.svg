<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="sakura" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FF69B4"/>
    </linearGradient>
  </defs>
  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="60" fill="#Fdfcf5" stroke="#d9465c" stroke-width="4"/>
  <!-- 樱花花瓣 -->
  <g transform="translate(64, 64)">
    <ellipse cx="0" cy="-25" rx="12" ry="25" fill="url(#sakura)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-25" rx="12" ry="25" fill="url(#sakura)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-25" rx="12" ry="25" fill="url(#sakura)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-25" rx="12" ry="25" fill="url(#sakura)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-25" rx="12" ry="25" fill="url(#sakura)" transform="rotate(288)"/>
    <!-- 花蕊 -->
    <circle cx="0" cy="0" r="8" fill="#FFD700"/>
  </g>
  <!-- 装饰文字 -->
  <text x="64" y="115" text-anchor="middle" font-size="12" fill="#2d2d2d" font-family="serif">花見小路</text>
</svg>
