name = "hanamikoji-server"
main = "apps/server/src/worker.ts"
compatibility_date = "2026-03-31"
workers_dev = true

[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# Worker 直接由 Wrangler 打包 TypeScript 源码，不需要额外构建命令。
# 保留空配置可避免部署时触发 pnpm build 导致的无部署/无响应问题。
[env.production.vars]
NODE_ENV = "production"
