name = "hanamikoji-server"
main = "apps/server/src/worker.ts"
compatibility_date = "2025-04-05"
workers_dev = true

[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[dev]
port = 8787
local_protocol = "http"

[env.production.vars]
NODE_ENV = "production"
